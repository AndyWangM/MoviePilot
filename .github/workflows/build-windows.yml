name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - 'version.py'

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows Package

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        shell: bash
        run: |
          app_version=$(cat version.py | sed -ne "s/APP_VERSION\s=\s'v\(.*\)'/\1/gp")
          frontend_version=$(cat version.py | sed -ne "s/FRONTEND_VERSION\s=\s'\(.*\)'/\1/gp")
          echo "app_version=$app_version" >> $GITHUB_ENV
          echo "frontend_version=$frontend_version" >> $GITHUB_ENV

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          pip install --upgrade pip
          # 固定 PyInstaller 5.x，6.x 有 pefile DLL 扫描 bug
          pip install "pyinstaller==5.13.2" pystray pillow
          pip install -r requirements.txt

      - name: Install Playwright browsers
        shell: bash
        run: playwright install chromium firefox

      - name: Download frontend dist
        shell: bash
        run: |
          curl -sL "https://github.com/AndyWangM/MoviePilot-Frontend/releases/download/${{ env.frontend_version }}/dist.zip" -o dist.zip
          unzip -q dist.zip -d frontend_tmp
          # 前端直接放到 public/，打包后作为静态文件目录
          mv frontend_tmp/dist public

      - name: Download resources (sites.bin etc.)
        shell: bash
        run: |
          curl -sL "https://github.com/jxxghp/MoviePilot-Resources/archive/refs/heads/main.zip" -o resources.zip
          unzip -q resources.zip
          cp -f MoviePilot-Resources-main/resources.v2/* app/helper/
          echo "resources 文件:"
          ls -lh app/helper/*.bin 2>/dev/null || echo "无 .bin 文件"

      - name: Download sites.pyd
        shell: bash
        env:
          SITES_TOKEN: ${{ secrets.SITES_TOKEN }}
        run: |
          # 获取最新 release 信息（含 assets 下载 URL）
          RELEASE_JSON=$(curl -s "https://api.github.com/repos/AndyWangM/MoviePilot-Sites/releases/latest" \
            -H "Authorization: Bearer $SITES_TOKEN")
          SITES_VERSION=$(echo "$RELEASE_JSON" | python -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "sites_version=$SITES_VERSION"
          # 从 assets 列表中找到 win_amd64.pyd 的 API 下载 URL（走 API 不走 S3 重定向）
          ASSET_URL=$(echo "$RELEASE_JSON" | python -c "
          import sys, json
          assets = json.load(sys.stdin)['assets']
          for a in assets:
              if 'win_amd64.pyd' in a['name']:
                  print(a['url'])
                  break
          ")
          echo "asset_url=$ASSET_URL"
          # 用 API URL + Accept: application/octet-stream 直接下载，不经过 S3 重定向
          curl -sL "$ASSET_URL" \
            -H "Authorization: Bearer $SITES_TOKEN" \
            -H "Accept: application/octet-stream" \
            -o app/helper/sites.cp312-win_amd64.pyd
          # 验证文件大小
          SIZE=$(wc -c < app/helper/sites.cp312-win_amd64.pyd)
          echo "Downloaded sites.pyd size: $SIZE bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "ERROR: sites.pyd too small, download likely failed"
            cat app/helper/sites.cp312-win_amd64.pyd
            exit 1
          fi

      - name: Build with PyInstaller (onedir)
        shell: bash
        run: |
          pyinstaller frozen_windows.spec --distpath dist_win --workpath build_win

      - name: Assemble package
        shell: bash
        run: |
          PKG="MoviePilot-${{ env.app_version }}-windows"
          mkdir -p "$PKG"
          # 主程序
          cp -r dist_win/MoviePilot/* "$PKG/"
          # 前端静态文件（FastAPI StaticFiles 从这里读取）
          cp -r public "$PKG/public"
          # 默认配置目录
          mkdir -p "$PKG/config"
          # 打包成 zip
          7z a "${PKG}.zip" "$PKG/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoviePilot-${{ env.app_version }}-windows
          path: MoviePilot-${{ env.app_version }}-windows.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/dev')
        with:
          tag_name: v${{ env.app_version }}-dev
          name: v${{ env.app_version }}-dev
          files: MoviePilot-${{ env.app_version }}-windows.zip
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
