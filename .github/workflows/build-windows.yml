name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - 'version.py'

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows Package

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        shell: bash
        run: |
          app_version=$(cat version.py | sed -ne "s/APP_VERSION\s=\s'v\(.*\)'/\1/gp")
          frontend_version=$(cat version.py | sed -ne "s/FRONTEND_VERSION\s=\s'\(.*\)'/\1/gp")
          echo "app_version=$app_version" >> $GITHUB_ENV
          echo "frontend_version=$frontend_version" >> $GITHUB_ENV

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          pip install --upgrade pip
          # 固定 PyInstaller 5.x，6.x 有 pefile DLL 扫描 bug
          pip install "pyinstaller==5.13.2" pystray pillow
          pip install -r requirements.txt

      - name: Install Playwright browsers
        shell: bash
        run: playwright install chromium firefox

      - name: Download frontend dist
        shell: pwsh
        run: |
          $url = "https://github.com/AndyWangM/MoviePilot-Frontend/releases/download/${{ env.frontend_version }}/dist.zip"
          Invoke-WebRequest -Uri $url -OutFile dist.zip -UseBasicParsing
          Expand-Archive -Path dist.zip -DestinationPath frontend_tmp -Force
          Move-Item frontend_tmp/dist public

      - name: Download resources (sites.bin etc.)
        shell: pwsh
        run: |
          # PowerShell 下载，带重试，避免 curl 在 Windows CI 上拿到 HTML 错误页
          $url = "https://github.com/jxxghp/MoviePilot-Resources/archive/refs/heads/main.zip"
          $out = "resources.zip"
          for ($i = 1; $i -le 3; $i++) {
            try {
              Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
              $size = (Get-Item $out).Length
              Write-Host "Downloaded resources.zip: $size bytes (attempt $i)"
              if ($size -gt 10000) { break }
              Write-Host "File too small, retrying..."
            } catch {
              Write-Host "Attempt $i failed: $_"
              if ($i -eq 3) { exit 1 }
            }
          }
          Expand-Archive -Path resources.zip -DestinationPath . -Force
          Copy-Item -Force MoviePilot-Resources-main/resources.v2/* app/helper/
          Write-Host "resources 文件:"
          Get-ChildItem app/helper/*.bin -ErrorAction SilentlyContinue | ForEach-Object { "$($_.Name) $($_.Length) bytes" }

      - name: Download sites.pyd
        shell: bash
        env:
          SITES_TOKEN: ${{ secrets.SITES_TOKEN }}
        run: |
          RELEASE_JSON=$(curl -s "https://api.github.com/repos/AndyWangM/MoviePilot-Sites/releases/latest" \
            -H "Authorization: Bearer $SITES_TOKEN")
          SITES_VERSION=$(echo "$RELEASE_JSON" | python -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "sites_version=$SITES_VERSION"
          ASSET_URL=$(echo "$RELEASE_JSON" | python -c "
          import sys, json
          assets = json.load(sys.stdin)['assets']
          for a in assets:
              if 'win_amd64.pyd' in a['name']:
                  print(a['url'])
                  break
          ")
          curl -sL "$ASSET_URL" \
            -H "Authorization: Bearer $SITES_TOKEN" \
            -H "Accept: application/octet-stream" \
            -o app/helper/sites.cp312-win_amd64.pyd
          SIZE=$(wc -c < app/helper/sites.cp312-win_amd64.pyd)
          echo "Downloaded sites.pyd size: $SIZE bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "ERROR: sites.pyd too small"
            cat app/helper/sites.cp312-win_amd64.pyd
            exit 1
          fi

      - name: Generate splash screen
        shell: python
        run: |
          from PIL import Image, ImageDraw, ImageFont
          import os

          W, H = 480, 420
          img = Image.new("RGB", (W, H), color=(30, 30, 30))
          draw = ImageDraw.Draw(img)

          # 尝试加载系统字体，否则用默认
          try:
              font_title = ImageFont.truetype("C:/Windows/Fonts/msyh.ttc", 28)
              font_sub   = ImageFont.truetype("C:/Windows/Fonts/msyh.ttc", 16)
          except Exception:
              font_title = ImageFont.load_default()
              font_sub   = font_title

          # 加载 logo（app.ico）
          try:
              ico = Image.open("app.ico").convert("RGBA").resize((80, 80))
              img.paste(ico, ((W - 80) // 2, 60), ico)
          except Exception:
              pass

          # 标题
          draw.text((W // 2, 170), "MoviePilot", font=font_title, fill="white", anchor="mm")
          draw.text((W // 2, 210), "NAS 媒体库自动化管理工具", font=font_sub, fill="#aaaaaa", anchor="mm")

          # 分隔线
          draw.line([(40, 240), (W - 40, 240)], fill="#444444", width=1)

          # 进度提示区（splash text 会覆盖这里）
          draw.text((W // 2, 390), "正在启动...", font=font_sub, fill="#888888", anchor="mm")

          img.save("splash.png")
          print("splash.png generated:", os.path.getsize("splash.png"), "bytes")

      - name: Add frontend to spec datas
        shell: bash
        run: |
          # 在 spec 的 datas 列表里追加 public/ 目录
          # PyInstaller datas 格式: (src, dest_in_bundle)
          python - <<'EOF'
          content = open('frozen_windows.spec', encoding='utf-8').read()
          inject = "        ('public', 'public'),\n"
          content = content.replace(
              "        ('app.ico', '.'),\n",
              "        ('app.ico', '.'),\n" + inject
          )
          open('frozen_windows.spec', 'w', encoding='utf-8').write(content)
          print("spec patched with public/ datas")
          EOF

      - name: Build with PyInstaller (onefile)
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          pyinstaller frozen_windows.spec --distpath dist_win --workpath build_win

      - name: Assemble package
        shell: bash
        run: |
          PKG="MoviePilot-${{ env.app_version }}-windows"
          mkdir -p "$PKG"
          # onefile: 只有一个 EXE
          cp dist_win/MoviePilot.exe "$PKG/"
          # config 默认目录（用户数据将存放于此）
          mkdir -p "$PKG/config"
          # 打包成 zip
          7z a "${PKG}.zip" "$PKG/"
          echo "Package size: $(du -sh ${PKG}.zip | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoviePilot-${{ env.app_version }}-windows
          path: MoviePilot-${{ env.app_version }}-windows.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/dev')
        with:
          tag_name: v${{ env.app_version }}-dev
          name: v${{ env.app_version }}-dev
          files: MoviePilot-${{ env.app_version }}-windows.zip
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
